<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Brad's Market Dashboard</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#0d1117;
    color:#e6edf3;
    font-family:Segoe UI, Arial, sans-serif;
    height:100vh;
}

.market-box{
    width:100vw;
    min-height:100vh;
    background:#161b22;
}

.tabs{
    display:flex;
    gap:30px;
    padding:20px 30px;
    background:#0d1117;
    border-bottom:1px solid #30363d;
    font-size:20px;
    font-weight:600;
}

.tab{
    cursor:pointer;
    color:#8b949e;
}

.tab.active{
    color:#ffffff;
    border-bottom:3px solid #58a6ff;
    padding-bottom:8px;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#21262d;
}

th{
    padding:18px;
    text-align:right;
    font-size:18px;
    color:#8b949e;
    border-bottom:1px solid #30363d;
}

th:first-child,
th:nth-child(2){
    text-align:left;
}

td{
    padding:22px 18px;
    font-size:28px;
    border-bottom:1px solid #21262d;
}

tr:hover{
    background:#1c2128;
}

.up{
    color:#3fb950;
    font-weight:bold;
}

.down{
    color:#f85149;
    font-weight:bold;
}

.market-name{
    font-weight:600;
}

.right{
    text-align:right;
}

.status-bar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    padding:12px 20px;
    background:#0d1117;
    border-top:1px solid #30363d;
    color:#8b949e;
    font-size:14px;
}

</style>
</head>

<body>

<div class="market-box">

    <div class="tabs">
        <div class="tab active">US</div>
        <div class="tab">EUROPE</div>
        <div class="tab">ASIA</div>
        <div class="tab">FX</div>
        <div class="tab">RATES</div>
        <div class="tab">FUTURES</div>
    </div>

    <table>
        <thead>
            <tr>
                <th></th>
                <th>MARKET</th>
                <th>PRICE</th>
                <th>CHANGE</th>
                <th>% CHANGE</th>
            </tr>
        </thead>

        <tbody id="marketData">
            <tr>
                <td colspan="5">Loading Market Data...</td>
            </tr>
        </tbody>
    </table>

</div>

<div class="status-bar" id="lastUpdate">
    Connecting...
</div>

<script>

const API_KEY = "d9h3de1r01qhv00kjgf0d9h3de1r01qhv00kjgfg";

const markets = [

    { name:"Dow", symbol:"DIA" },
    { name:"S&P 500", symbol:"SPY" },
    { name:"Nasdaq", symbol:"QQQ" },
    { name:"Gold", symbol:"GLD" },
    { name:"Silver", symbol:"SLV" },
    { name:"Oil", symbol:"USO" }

];

async function updateMarkets(){

    const tbody = document.getElementById("marketData");

    tbody.innerHTML = "";

    for(const market of markets){

        try{

            const response = await fetch(
                `https://finnhub.io/api/v1/quote?symbol=${market.symbol}&token=${API_KEY}`
            );

            const data = await response.json();

            const positive = Number(data.d) >= 0;

            const arrow = positive ? "▲" : "▼";

            tbody.innerHTML += `
                <tr>

                    <td class="${positive ? 'up':'down'}">
                        ${arrow}
                    </td>

                    <td class="market-name">
                        ${market.name}
                    </td>

                    <td class="right">
                        ${Number(data.c).toFixed(2)}
                    </td>

                    <td class="right ${positive ? 'up':'down'}">
                        ${Number(data.d).toFixed(2)}
                    </td>

                    <td class="right ${positive ? 'up':'down'}">
                        ${Number(data.dp).toFixed(2)}%
                    </td>

                </tr>
            `;

        } catch(err){

            console.log(err);

        }
    }

    document.getElementById("lastUpdate").innerHTML =
        "Last Updated: " +
        new Date().toLocaleTimeString();

}

updateMarkets();

setInterval(updateMarkets, 15000);

</script>

</body>
</html>
