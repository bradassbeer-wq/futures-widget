<script>

const API_KEY = "d9h3rhhr01qhv00kl4vgd9h3rhhr01qhv00kl500";

let rateLimited = false;
let retryAfter = 0;

const markets = [
    { id:"dow",    name:"Dow",     symbol:"DIA" },
    { id:"spx",    name:"S&P 500", symbol:"SPY" },
    { id:"nasdaq", name:"Nasdaq",  symbol:"QQQ" },
    { id:"gold",   name:"Gold",    symbol:"GLD" },
    { id:"silver", name:"Silver",  symbol:"SLV" },
    { id:"oil",    name:"Oil",     symbol:"USO" }
];

const tbody = document.getElementById("marketData");

function createRows(){

    markets.forEach(market=>{

        const row = document.createElement("tr");

        row.innerHTML = `
            <td id="${market.id}-arrow">•</td>
            <td class="market-name">${market.name}</td>
            <td class="right" id="${market.id}-price">Loading...</td>
            <td class="right" id="${market.id}-change">--</td>
            <td class="right" id="${market.id}-pct">--</td>
        `;

        tbody.appendChild(row);

    });

}

function flashPrice(cell,newPrice){

    const oldPrice = parseFloat(cell.textContent);

    if(isNaN(oldPrice)) return;

    if(newPrice > oldPrice){

        cell.classList.add("flash-up");

        setTimeout(()=>{
            cell.classList.remove("flash-up");
        },700);
    }

    if(newPrice < oldPrice){

        cell.classList.add("flash-down");

        setTimeout(()=>{
            cell.classList.remove("flash-down");
        },700);
    }
}

async function updateMarkets(){

    if(rateLimited && Date.now() < retryAfter){
        return;
    }

    for(const market of markets){

        try{

            const response = await fetch(
                `https://finnhub.io/api/v1/quote?symbol=${market.symbol}&token=${API_KEY}`
            );

            const data = await response.json();

            console.log(market.symbol,data);

            if(data.error){

                if(
                    data.error.toLowerCase().includes("limit") ||
                    data.error.toLowerCase().includes("rate")
                ){

                    rateLimited = true;
                    retryAfter = Date.now() + 60000;

                    document.getElementById("lastUpdate").innerHTML =
                        "⚠ API Limit Reached - Retrying in 60 Seconds";

                    return;
                }

                throw new Error(data.error);
            }

            rateLimited = false;

            const price =
                typeof data.c === "number"
                ? data.c
                : null;

            const change =
                typeof data.d === "number"
                ? data.d
                : null;

            const percent =
                typeof data.dp === "number"
                ? data.dp
                : null;

            const arrowCell =
                document.getElementById(`${market.id}-arrow`);

            const priceCell =
                document.getElementById(`${market.id}-price`);

            const changeCell =
                document.getElementById(`${market.id}-change`);

            const pctCell =
                document.getElementById(`${market.id}-pct`);

            if(
                price === null ||
                change === null ||
                percent === null
            ){

                arrowCell.textContent = "•";
                arrowCell.className = "";

                priceCell.textContent = "--";
                changeCell.textContent = "--";
                pctCell.textContent = "--";

                continue;
            }

            const positive = change >= 0;

            const color =
                positive ? "up" : "down";

            flashPrice(priceCell,price);

            arrowCell.textContent =
                positive ? "▲" : "▼";

            arrowCell.className =
                color;

            priceCell.textContent =
                price.toFixed(2);

            priceCell.className =
                `right ${color}`;

            changeCell.textContent =
                change.toFixed(2);

            changeCell.className =
                `right ${color}`;

            pctCell.textContent =
                percent.toFixed(2) + "%";

            pctCell.className =
                `right ${color}`;

        }
        catch(error){

            console.error(error);

            document.getElementById(
                `${market.id}-price`
            ).textContent = "--";

            document.getElementById(
                `${market.id}-change`
            ).textContent = "--";

            document.getElementById(
                `${market.id}-pct`
            ).textContent = "--";
        }
    }

    document.getElementById("lastUpdate").innerHTML =
        "Last Updated: " +
        new Date().toLocaleTimeString([],{
            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit"
        });
}

createRows();
updateMarkets();

setInterval(updateMarkets,5000);

</script>
