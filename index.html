<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brad's Market Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:#ffffff;
    font-family:Segoe UI,Arial,sans-serif;
}

.header{
    padding:24px;
    font-size:48px;
    font-weight:700;
}

.tabs{
    display:flex;
    gap:30px;
    padding:0 24px;
    border-bottom:1px solid #30363d;
}

.tab{
    padding:14px 0;
    cursor:pointer;
    color:#8b949e;
    font-size:22px;
    font-weight:600;
}

.tab.active{
    color:white;
    border-bottom:3px solid #58a6ff;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#161b22;
}

th{
    color:#8b949e;
    padding:16px;
    font-size:16px;
    text-align:right;
}

th:first-child,
th:nth-child(2){
    text-align:left;
}

td{
    padding:22px 16px;
    font-size:22px;
    border-top:1px solid #21262d;
}

.market{
    font-weight:700;
}

.arrow{
    width:40px;
}

.right{
    text-align:right;
}

.up{
    color:#00c853;
}

.down{
    color:#ff5252;
}

.change-col,
.pct-col{
    font-weight:600;
}

.status{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    padding:10px 20px;
    background:#161b22;
    border-top:1px solid #30363d;
    color:#8b949e;
}

</style>
</head>

<body>

<div class="header">
Market Dashboard
</div>

<div class="tabs">

    <div class="tab active" id="tab-us">
        US
    </div>

    <div class="tab" id="tab-tracking">
        TRACKING ETFs
    </div>

</div>

<table>

<thead>
<tr>
    <th></th>
    <th>MARKET</th>
    <th>PRICE</th>
    <th>CHANGE</th>
    <th>% CHG</th>
</tr>
</thead>

<tbody id="marketData">
</tbody>

</table>

<div id="lastUpdate" class="status">
Connecting...
</div>

<script>

const API_KEY =
"d9h3rhhr01qhv00kl4vgd9h3rhhr01qhv00kl500";

const datasets = {

us:[

{
id:"dia",
name:"Dow ETF (DIA)",
symbol:"DIA"
},

{
id:"spy",
name:"S&P 500 ETF (SPY)",
symbol:"SPY"
},

{
id:"qqq",
name:"Nasdaq ETF (QQQ)",
symbol:"QQQ"
},

{
id:"gld",
name:"Gold ETF (GLD)",
symbol:"GLD"
},

{
id:"slv",
name:"Silver ETF (SLV)",
symbol:"SLV"
},

{
id:"uso",
name:"Oil ETF (USO)",
symbol:"USO"
}

],

tracking:[

{
id:"spy2",
name:"SPDR S&P 500 ETF",
symbol:"SPY"
},

{
id:"qqq2",
name:"Invesco QQQ ETF",
symbol:"QQQ"
},

{
id:"dia2",
name:"SPDR Dow ETF",
symbol:"DIA"
},

{
id:"gld2",
name:"SPDR Gold ETF",
symbol:"GLD"
},

{
id:"slv2",
name:"iShares Silver ETF",
symbol:"SLV"
},

{
id:"uso2",
name:"United States Oil ETF",
symbol:"USO"
}

]

};

let currentTab = "us";

const tbody =
document.getElementById("marketData");

function buildTable(){

    tbody.innerHTML = "";

    datasets[currentTab].forEach(market => {

        const row =
        document.createElement("tr");

        row.innerHTML = `
            <td class="arrow"
                id="${market.id}-arrow">
                •
            </td>

            <td class="market">
                ${market.name}
            </td>

            <td class="right"
                id="${market.id}-price">
                --
            </td>

            <td class="right change-col"
                id="${market.id}-change">
                --
            </td>

            <td class="right pct-col"
                id="${market.id}-pct">
                --
            </td>
        `;

        tbody.appendChild(row);

    });

}

async function updateMarkets(){

    for(const market of datasets[currentTab]){

        try{

            const response =
            await fetch(
            `https://finnhub.io/api/v1/quote?symbol=${market.symbol}&token=${API_KEY}`
            );

            const data =
            await response.json();

            if(
                !data ||
                data.c == null ||
                data.d == null ||
                data.dp == null
            ){
                continue;
            }

            const price =
            Number(data.c);

            const change =
            Number(data.d);

            const pct =
            Number(data.dp);

            const positive =
            change >= 0;

            const color =
            positive ? "up" : "down";

            document.getElementById(
            `${market.id}-arrow`
            ).textContent =
            positive ? "▲" : "▼";

            document.getElementById(
            `${market.id}-arrow`
            ).className =
            `arrow ${color}`;

            document.getElementById(
            `${market.id}-price`
            ).textContent =
            price.toFixed(2);

            document.getElementById(
            `${market.id}-price`
            ).className =
            "right";

            document.getElementById(
            `${market.id}-change`
            ).textContent =
            (change > 0 ? "+" : "") +
            change.toFixed(2);

            document.getElementById(
            `${market.id}-change`
            ).className =
            `right change-col ${color}`;

            document.getElementById(
            `${market.id}-pct`
            ).textContent =
            (pct > 0 ? "+" : "") +
            pct.toFixed(2) + "%";

            document.getElementById(
            `${market.id}-pct`
            ).className =
            `right pct-col ${color}`;

        }
        catch(err){

            console.log(err);

        }
    }

    document.getElementById(
    "lastUpdate"
    ).textContent =
    "Last Updated: " +
    new Date().toLocaleTimeString();

}

function switchTab(tab){

    currentTab = tab;

    document
    .querySelectorAll(".tab")
    .forEach(
        t => t.classList.remove("active")
    );

    document
    .getElementById(`tab-${tab}`)
    .classList.add("active");

    buildTable();
    updateMarkets();

}

document
.getElementById("tab-us")
.addEventListener(
"click",
()=>switchTab("us")
);

document
.getElementById("tab-tracking")
.addEventListener(
"click",
()=>switchTab("tracking")
);

buildTable();
updateMarkets();

setInterval(
updateMarkets,
5000
);

</script>

</body>
</html>
