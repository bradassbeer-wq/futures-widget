<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Futures Market Overview</title>

  <style>
    body {
      background: #0b0b0c;
      color: #ffffff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .tradingview-widget-container {
      max-width: 600px;
    }

    .tradingview-widget-container__widget {
      background: #0b0b0c !important;
    }

    .tradingview-widget-container * {
      color: #e6e6e6 !important;
      font-size: 14px !important;
    }

    .tv-widget-market-overview__change--positive {
      color: #00c853 !important;
    }

    .tv-widget-market-overview__change--negative {
      color: #ff5252 !important;
    }

    .tv-widget-market-overview__sparkline path {
      stroke-width: 1.2 !important;
    }
  </style>
</head>

<body>
