<script>

document.addEventListener("DOMContentLoaded", () => {

const API_KEY =
"d9h3rhhr01qhv00kl4vgd9h3rhhr01qhv00kl500";

let rateLimited = false;
let retryAfter = 0;

const markets = [

{
    id:"dow",
    name:"Dow",
    symbol:"DIA",
    multiplier:100
},

{
    id:"spx",
    name:"S&P 500",
    symbol:"SPY",
    multiplier:10
},

{
    id:"nasdaq",
    name:"Nasdaq",
    symbol:"QQQ",
    multiplier:36
},

{
    id:"gold",
    name:"Gold",
    symbol:"GLD",
    multiplier:10.9
},

{
    id:"silver",
    name:"Silver",
    symbol:"SLV",
    multiplier:0.37
},

{
    id:"oil",
    name:"Oil",
    symbol:"USO",
    multiplier:0.66
}

];

const tbody =
document.getElementById("marketData");

markets.forEach(market => {

    const row =
    document.createElement("tr");

    row.innerHTML = `
        <td id="${market.id}-arrow">•</td>

        <td class="market">
            ${market.name}
        </td>

        <td class="right"
            id="${market.id}-index">
            --
        </td>

        <td class="right"
            id="${market.id}-etf">
            --
        </td>

        <td class="right"
            id="${market.id}-change">
            --
        </td>

        <td class="right"
            id="${market.id}-pct">
            --
        </td>
    `;

    tbody.appendChild(row);

});

async function updateMarkets(){

    if(rateLimited &&
       Date.now() < retryAfter){

        return;
    }

    for(const market of markets){

        try{

            const response =
            await fetch(
                `https://finnhub.io/api/v1/quote?symbol=${market.symbol}&token=${API_KEY}`
            );

            const data =
            await response.json();

            if(data.error){

                console.log(data.error);

                if(
                    data.error.toLowerCase()
                    .includes("limit")
                ){

                    rateLimited = true;

                    retryAfter =
                    Date.now() +
                    60000;

                    document
                    .getElementById(
                        "lastUpdate"
                    ).innerHTML =
                    "⚠ API limit reached - retrying in 60 seconds";

                    return;
                }

                continue;
            }

            if(
                data.c == null ||
                data.d == null ||
                data.dp == null
            ){
                continue;
            }

            const etfPrice =
            Number(data.c);

            const indexPrice =
            etfPrice *
            market.multiplier;

            const change =
            Number(data.d);

            const pct =
            Number(data.dp);

            const positive =
            change >= 0;

            const color =
            positive
                ? "up"
                : "down";

            document.getElementById(
                `${market.id}-arrow`
            ).textContent =
            positive ? "▲" : "▼";

            document.getElementById(
                `${market.id}-arrow`
            ).className =
            color;

            document.getElementById(
                `${market.id}-index`
            ).textContent =
            indexPrice.toLocaleString(
                undefined,
                {
                    minimumFractionDigits:2,
                    maximumFractionDigits:2
                }
            );

            document.getElementById(
                `${market.id}-index`
            ).className =
            `right ${color}`;

            document.getElementById(
                `${market.id}-etf`
            ).textContent =
            etfPrice.toFixed(2);

            document.getElementById(
                `${market.id}-etf`
            ).className =
            `right ${color}`;

            document.getElementById(
                `${market.id}-change`
            ).textContent =
            change.toFixed(2);

            document.getElementById(
                `${market.id}-change`
            ).className =
            `right ${color}`;

            document.getElementById(
                `${market.id}-pct`
            ).textContent =
            pct.toFixed(2) + "%";

            document.getElementById(
                `${market.id}-pct`
            ).className =
            `right ${color}`;

        }
        catch(error){

            console.error(error);

        }
    }

    document.getElementById(
        "lastUpdate"
    ).innerHTML =
    "Last Updated: " +
    new Date()
    .toLocaleTimeString();

}

updateMarkets();

setInterval(
    updateMarkets,
    5000
);

});

</script>
