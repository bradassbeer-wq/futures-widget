<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Market Dashboard</title>

<style>

body{
    margin:0;
    background:#0d1117;
    color:white;
    font-family:Segoe UI,Arial,sans-serif;
}

.header{
    padding:20px;
    font-size:36px;
    font-weight:bold;
    border-bottom:1px solid #30363d;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#161b22;
}

th{
    padding:18px;
    color:#8b949e;
    text-align:right;
}

th:first-child,
th:nth-child(2){
    text-align:left;
}

td{
    padding:20px;
    font-size:24px;
    border-top:1px solid #30363d;
}

.market{
    font-weight:bold;
}

.right{
    text-align:right;
}

.up{
    color:#3fb950;
}

.down{
    color:#f85149;
}

.status{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    padding:10px;
    background:#161b22;
    border-top:1px solid #30363d;
}

</style>

</head>
<body>

<div class="header">
Market Dashboard
</div>

<table>

<thead>
<tr>
    <th></th>
    <th>Market</th>
    <th>Index Est.</th>
    <th>ETF Price</th>
    <th>Change</th>
    <th>% Change</th>
</tr>
</thead>

<tbody id="marketData">
</tbody>

</table>

<div class="status" id="lastUpdate">
Connecting...
</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

const API_KEY =
"d9h3rhhr01qhv00kl4vgd9h3rhhr01qhv00kl500";

const markets = [

{
    id:"dow",
    name:"Dow",
    symbol:"DIA",
    multiplier:100
},

{
    id:"spx",
    name:"S&P 500",
    symbol:"SPY",
    multiplier:10
},

{
    id:"nasdaq",
    name:"Nasdaq",
    symbol:"QQQ",
    multiplier:36
},

{
    id:"gold",
    name:"Gold",
    symbol:"GLD",
    multiplier:10.9
},

{
    id:"silver",
    name:"Silver",
    symbol:"SLV",
    multiplier:0.37
},

{
    id:"oil",
    name:"Oil",
    symbol:"USO",
    multiplier:0.66
}

];

const tbody =
document.getElementById("marketData");

markets.forEach(market => {

    const row =
    document.createElement("tr");

    row.innerHTML = `
        <td id="${market.id}-arrow">•</td>

        <td class="market">
            ${market.name}
        </td>

        <td class="right" id="${market.id}-index">
            --
        </td>

        <td class="right" id="${market.id}-etf">
            --
        </td>

        <td class="right" id="${market.id}-change">
            --
        </td>

        <td class="right" id="${market.id}-pct">
            --
        </td>
    `;

    tbody.appendChild(row);

});

async function updateMarkets(){

    for(const market of markets){

        try{

            const response =
            await fetch(
                `https://finnhub.io/api/v1/quote?symbol=${market.symbol}&token=${API_KEY}`
            );

            const data =
            await response.json();

            if(
                !data ||
                data.c == null
            ){
                continue;
            }

            const etfPrice =
            Number(data.c);

            const indexPrice =
            etfPrice *
            market.multiplier;

            const change =
            Number(data.d);

            const pct =
            Number(data.dp);

            const positive =
            change >= 0;

            const color =
            positive ? "up" : "down";

            document.getElementById(
                `${market.id}-arrow`
            ).textContent =
            positive ? "▲" : "▼";

            document.getElementById(
                `${market.id}-arrow`
            ).className =
            color;

            document.getElementById(
                `${market.id}-index`
            ).textContent =
            indexPrice.toLocaleString();

            document.getElementById(
                `${market.id}-index`
            ).className =
            `right ${color}`;

            document.getElementById(
                `${market.id}-etf`
            ).textContent =
            etfPrice.toFixed(2);

            document.getElementById(
                `${market.id}-etf`
            ).className =
            `right ${color}`;

            document.getElementById(
                `${market.id}-change`
            ).textContent =
            change.toFixed(2);

            document.getElementById(
                `${market.id}-change`
            ).className =
            `right ${color}`;

            document.getElementById(
                `${market.id}-pct`
            ).textContent =
            pct.toFixed(2) + "%";

            document.getElementById(
                `${market.id}-pct`
            ).className =
            `right ${color}`;

        }
        catch(err){

            console.log(err);

        }
    }

    document.getElementById(
        "lastUpdate"
    ).textContent =
        "Last Updated: " +
        new Date().toLocaleTimeString();
}

updateMarkets();

setInterval(
    updateMarkets,
    5000
);

});

</script>

</body>
</html>
