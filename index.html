<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Markets Dashboard</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#ffffff;
    margin:20px;
}

.market-box{
    width:340px;
    border:1px solid #dcdcdc;
}

.tabs{
    display:flex;
    gap:12px;
    padding:8px 10px;
    background:#f3f3f3;
    border-bottom:1px solid #dcdcdc;
    font-size:13px;
    font-weight:bold;
}

.tab{
    color:#555;
}

.active{
    color:#000;
    border-bottom:2px solid #000;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    font-size:12px;
    color:#444;
    text-align:right;
    padding:8px 6px;
    background:#fafafa;
}

th:first-child,
th:nth-child(2){
    text-align:left;
}

td{
    padding:8px 6px;
    border-top:1px solid #e5e5e5;
    font-size:14px;
}

tr:nth-child(even){
    background:#f7f7f7;
}

.up{
    color:#148f2d;
    font-weight:bold;
}

.down{
    color:#d40000;
    font-weight:bold;
}

.name{
    text-align:left;
}

.num{
    text-align:right;
}

.status{
    margin-top:10px;
    color:#777;
    font-size:12px;
}

</style>
</head>

<body>

<div class="market-box">

    <div class="tabs">
        <div class="tab active">US</div>
        <div class="tab">EUROPE</div>
        <div class="tab">ASIA</div>
        <div class="tab">FX</div>
        <div class="tab">RATES</div>
        <div class="tab">FUTURES</div>
    </div>

    <table>
        <thead>
            <tr>
                <th></th>
                <th class="name">MARKET</th>
                <th>PRICE</th>
                <th>CHANGE</th>
                <th>% CHG</th>
            </tr>
        </thead>

        <tbody id="marketData">
        </tbody>
    </table>

</div>

<div class="status" id="lastUpdate">
Loading...
</div>

<script>

const API_KEY = "d9h3de1r01qhv00kjgf0d9h3de1r01qhv00kjgfg";

const markets = [

    {
        name: "Dow",
        symbol: "DIA"
    },

    {
        name: "S&P 500",
        symbol: "SPY"
    },

    {
        name: "Nasdaq",
        symbol: "QQQ"
    },

    {
        name: "Gold",
        symbol: "GLD"
    },

    {
        name: "Silver",
        symbol: "SLV"
    },

    {
        name: "Oil",
        symbol: "USO"
    }

];

async function loadMarketData() {

    const tbody = document.getElementById("marketData");
    tbody.innerHTML = "";

    for (const market of markets) {

        try {

            const response = await fetch(
                `https://finnhub.io/api/v1/quote?symbol=${market.symbol}&token=${API_KEY}`
            );

            const data = await response.json();

            const positive = data.d >= 0;

            const arrow = positive ? "↑" : "↓";

            const colorClass = positive ? "up" : "down";

            const row = `
                <tr>
                    <td class="${colorClass}">
                        ${arrow}
                    </td>

                    <td class="name">
                        ${market.name}
                    </td>

                    <td class="num">
                        ${Number(data.c).toFixed(2)}
                    </td>

                    <td class="num ${colorClass}">
                        ${Number(data.d).toFixed(2)}
                    </td>

                    <td class="num ${colorClass}">
                        ${Number(data.dp).toFixed(2)}%
                    </td>
                </tr>
            `;

            tbody.insertAdjacentHTML("beforeend", row);

        } catch (e) {

            console.error(e);

        }

    }

    document.getElementById("lastUpdate").innerText =
        "Last updated: " + new Date().toLocaleTimeString();

}

loadMarketData();

setInterval(loadMarketData, 10000);

</script>

</body>
</html>
