<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brad's Market Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
}

.header{
    padding:20px;
    font-size:36px;
    font-weight:bold;
}

.tabs{
    display:flex;
    gap:25px;
    padding:0 20px;
    border-bottom:1px solid #30363d;
}

.tab{
    padding:15px 0;
    cursor:pointer;
    color:#8b949e;
    font-weight:bold;
}

.tab.active{
    color:#fff;
    border-bottom:3px solid #58a6ff;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#161b22;
}

th{
    padding:15px;
    color:#8b949e;
    font-size:15px;
    text-align:right;
}

th:first-child,
th:nth-child(2){
    text-align:left;
}

td{
    padding:18px;
    font-size:24px;
    border-top:1px solid #21262d;
}

.market{
    font-weight:bold;
}

.right{
    text-align:right;
}

.arrow{
    width:40px;
}

.up{
    color:#00c853;
    font-weight:500;
}

.down{
    color:#ff5252;
    font-weight:500;
}

.status{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#161b22;
    border-top:1px solid #30363d;
    padding:10px 20px;
    color:#8b949e;
}

.change-col,
.pct-col{
    font-size:22px;
    font-weight:500;
}

</style>
</head>

<body>

<div class="header">
Market Dashboard
</div>

<div class="tabs">
    <div class="tab active" id="tab-us">
        US
    </div>

    <div class="tab" id="tab-futures">
        FUTURES
    </div>
</div>

<table>

<thead>
<tr>
    <th></th>
    <th>MARKET</th>
    <th>INDEX EST.</th>
    <th>ETF</th>
    <th>CHANGE</th>
    <th>% CHG</th>
</tr>
</thead>

<tbody id="marketData">
</tbody>

</table>

<div class="status" id="lastUpdate">
Connecting...
</div>

<script>

const API_KEY =
"d9h3rhhr01qhv00kl4vgd9h3rhhr01qhv00kl500";

const datasets = {

us:[

{id:"dow",name:"Dow",symbol:"DIA",multiplier:100},
{id:"spx",name:"S&P 500",symbol:"SPY",multiplier:10},
{id:"nasdaq",name:"Nasdaq",symbol:"QQQ",multiplier:36},
{id:"gold",name:"Gold",symbol:"GLD",multiplier:10.9},
{id:"silver",name:"Silver",symbol:"SLV",multiplier:0.37},
{id:"oil",name:"Oil",symbol:"USO",multiplier:0.66}

],

futures:[

{id:"es",name:"S&P Futures",symbol:"SPY",multiplier:10},
{id:"nq",name:"Nasdaq Futures",symbol:"QQQ",multiplier:36},
{id:"ym",name:"Dow Futures",symbol:"DIA",multiplier:100},
{id:"gc",name:"Gold Futures",symbol:"GLD",multiplier:10.9},
{id:"cl",name:"Oil Futures",symbol:"USO",multiplier:0.66}

]

};

let currentTab = "us";

const tbody =
document.getElementById("marketData");

function buildTable(){

    tbody.innerHTML="";

    datasets[currentTab].forEach(market=>{

        const row =
        document.createElement("tr");

        row.innerHTML = `
            <td class="arrow"
                id="${market.id}-arrow">
                •
            </td>

            <td class="market">
                ${market.name}
            </td>

            <td class="right"
                id="${market.id}-index">
                --
            </td>

            <td class="right"
                id="${market.id}-etf">
                --
            </td>

            <td class="right change-col"
                id="${market.id}-change">
                --
            </td>

            <td class="right pct-col"
                id="${market.id}-pct">
                --
            </td>
        `;

        tbody.appendChild(row);

    });

}

async function updateMarkets(){

    for(const market of datasets[currentTab]){

        try{

            const response =
            await fetch(
            `https://finnhub.io/api/v1/quote?symbol=${market.symbol}&token=${API_KEY}`
            );

            const data =
            await response.json();

            if(
                !data ||
                data.c == null ||
                data.d == null ||
                data.dp == null
            ){
                continue;
            }

            const etfPrice =
            Number(data.c);

            const indexValue =
            etfPrice *
            market.multiplier;

            const etfChange =
            Number(data.d);

            const indexChange =
            etfChange *
            market.multiplier;

            const pct =
            Number(data.dp);

            const positive =
            indexChange >= 0;

            const color =
            positive ? "up" : "down";

            document.getElementById(
            `${market.id}-arrow`
            ).textContent =
            positive ? "▲" : "▼";

            document.getElementById(
            `${market.id}-arrow`
            ).className =
            `arrow ${color}`;

            document.getElementById(
            `${market.id}-index`
            ).textContent =
            indexValue.toLocaleString(
                undefined,
                {
                    minimumFractionDigits:2,
                    maximumFractionDigits:2
                }
            );

            document.getElementById(
            `${market.id}-index`
            ).className =
            "right";

            document.getElementById(
            `${market.id}-etf`
            ).textContent =
            etfPrice.toFixed(2);

            document.getElementById(
            `${market.id}-etf`
            ).className =
            "right";

            document.getElementById(
            `${market.id}-change`
            ).textContent =
            (indexChange > 0 ? "+" : "") +
            indexChange.toFixed(2);

            document.getElementById(
            `${market.id}-change`
            ).className =
            `right change-col ${color}`;

            document.getElementById(
            `${market.id}-pct`
            ).textContent =
            (pct > 0 ? "+" : "") +
            pct.toFixed(2) + "%";

            document.getElementById(
            `${market.id}-pct`
            ).className =
            `right pct-col ${color}`;

        }
        catch(err){

            console.log(err);

        }

    }

    document.getElementById(
    "lastUpdate"
    ).textContent =
    "Last Updated: " +
    new Date().toLocaleTimeString();

}

function switchTab(tab){

    currentTab = tab;

    document
    .querySelectorAll(".tab")
    .forEach(
        t => t.classList.remove("active")
    );

    document
    .getElementById(`tab-${tab}`)
    .classList.add("active");

    buildTable();
    updateMarkets();

}

document
.getElementById("tab-us")
.addEventListener(
"click",
()=>switchTab("us")
);

document
.getElementById("tab-futures")
.addEventListener(
"click",
()=>switchTab("futures")
);

buildTable();
updateMarkets();

setInterval(
updateMarkets,
25000
);

</script>

</body>
</html>
