<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Market Dashboard</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f5f5;
    margin:20px;
}

.market-box{
    width:360px;
    background:#fff;
    border:1px solid #d8d8d8;
}

.tabs{
    display:flex;
    gap:12px;
    padding:8px 10px;
    background:#f0f0f0;
    border-bottom:1px solid #d8d8d8;
    font-weight:bold;
    font-size:13px;
}

.tabs span:first-child{
    border-bottom:2px solid #000;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    padding:8px 6px;
    font-size:12px;
    color:#444;
    text-align:right;
}

th:nth-child(1),
th:nth-child(2){
    text-align:left;
}

td{
    padding:8px 6px;
    border-top:1px solid #e5e5e5;
    font-size:14px;
}

tr:nth-child(even){
    background:#f4f4f4;
}

.up{
    color:#0f9d58;
    font-weight:bold;
}

.down{
    color:#d93025;
    font-weight:bold;
}

.right{
    text-align:right;
}

</style>
</head>

<body>

<div class="market-box">

<div class="tabs">
<span>US</span>
<span>EUROPE</span>
<span>ASIA</span>
<span>FX</span>
<span>RATES</span>
<span>FUTURES</span>
</div>

<table>

<thead>
<tr>
<th></th>
<th>MARKET</th>
<th>PRICE</th>
<th>CHANGE</th>
<th>% CHG</th>
</tr>
</thead>

<tbody id="marketData">
<tr>
<td colspan="5">Loading...</td>
</tr>
</tbody>

</table>

</div>

<script>

const API_KEY = "d9h3de1r01qhv00kjgf0d9h3de1r01qhv00kjgfg";

const markets = [
  { name:"Dow", symbol:"DIA" },
  { name:"S&P 500", symbol:"SPY" },
  { name:"Nasdaq", symbol:"QQQ" },
  { name:"Gold", symbol:"GLD" },
  { name:"Silver", symbol:"SLV" },
  { name:"Oil", symbol:"USO" }
];

async function updateMarkets(){

    const tbody = document.getElementById("marketData");

    tbody.innerHTML="";

    for(const market of markets){

        try{

            const response = await fetch(
                `https://finnhub.io/api/v1/quote?symbol=${market.symbol}&token=${API_KEY}`
            );

            const data = await response.json();

            const positive = data.d >= 0;

            tbody.innerHTML += `
            <tr>
                <td class="${positive?'up':'down'}">
                    ${positive?'↑':'↓'}
                </td>

                <td>
                    ${market.name}
                </td>

                <td class="right">
                    ${Number(data.c).toFixed(2)}
                </td>

                <td class="right ${positive?'up':'down'}">
                    ${Number(data.d).toFixed(2)}
                </td>

                <td class="right ${positive?'up':'down'}">
                    ${Number(data.dp).toFixed(2)}%
                </td>
            </tr>`;
        }

        catch(err){

            console.error(err);

        }
    }
}

updateMarkets();

setInterval(updateMarkets,15000);

</script>

</body>
</html>
