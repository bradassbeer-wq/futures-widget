<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brad's Market Dashboard</title>

<style>

body{
    margin:0;
    padding:0;
    background:#0d1117;
    color:white;
    font-family:Segoe UI,Arial,sans-serif;
}

.header{
    padding:20px;
    font-size:32px;
    font-weight:bold;
    border-bottom:1px solid #30363d;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#161b22;
    color:#8b949e;
    padding:18px;
    font-size:18px;
    text-align:right;
}

th:first-child,
th:nth-child(2){
    text-align:left;
}

td{
    padding:20px;
    font-size:26px;
    border-top:1px solid #30363d;
}

.market{
    font-weight:bold;
}

.right{
    text-align:right;
}

.up{
    color:#3fb950;
}

.down{
    color:#f85149;
}

.status{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    padding:10px;
    background:#161b22;
    border-top:1px solid #30363d;
    color:#8b949e;
}

</style>
</head>

<body>

<div class="header">
Market Dashboard
</div>

<table>

<thead>
<tr>
    <th></th>
    <th>Market</th>
    <th>Price</th>
    <th>Change</th>
    <th>% Change</th>
</tr>
</thead>

<tbody id="marketData">
</tbody>

</table>

<div class="status" id="lastUpdate">
Connecting...
</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

const API_KEY =
"d9h3rhhr01qhv00kl4vgd9h3rhhr01qhv00kl500";

const markets = [
    { id:"dow", name:"Dow", symbol:"DIA" },
    { id:"spx", name:"S&P 500", symbol:"SPY" },
    { id:"nasdaq", name:"Nasdaq", symbol:"QQQ" },
    { id:"gold", name:"Gold", symbol:"GLD" },
    { id:"silver", name:"Silver", symbol:"SLV" },
    { id:"oil", name:"Oil", symbol:"USO" }
];

const tbody =
document.getElementById("marketData");

markets.forEach(market => {

    const row =
    document.createElement("tr");

    row.innerHTML = `
        <td id="${market.id}-arrow">•</td>
        <td class="market">${market.name}</td>
        <td class="right" id="${market.id}-price">--</td>
        <td class="right" id="${market.id}-change">--</td>
        <td class="right" id="${market.id}-pct">--</td>
    `;

    tbody.appendChild(row);
});

async function updateMarkets(){

    for(const market of markets){

        try{

            const response =
            await fetch(
                `https://finnhub.io/api/v1/quote?symbol=${market.symbol}&token=${API_KEY}`
            );

            const data =
            await response.json();

            console.log(
                market.symbol,
                data
            );

            if(data.error){
                continue;
            }

            if(
                data.c == null ||
                data.d == null ||
                data.dp == null
            ){
                continue;
            }

            const positive =
            data.d >= 0;

            const color =
            positive ? "up" : "down";

            document.getElementById(
                `${market.id}-arrow`
            ).textContent =
            positive ? "▲" : "▼";

            document.getElementById(
                `${market.id}-arrow`
            ).className =
            color;

            document.getElementById(
                `${market.id}-price`
            ).textContent =
            Number(data.c).toFixed(2);

            document.getElementById(
                `${market.id}-price`
            ).className =
            `right ${color}`;

            document.getElementById(
                `${market.id}-change`
            ).textContent =
            Number(data.d).toFixed(2);

            document.getElementById(
                `${market.id}-change`
            ).className =
            `right ${color}`;

            document.getElementById(
                `${market.id}-pct`
            ).textContent =
            Number(data.dp).toFixed(2) + "%";

            document.getElementById(
                `${market.id}-pct`
            ).className =
            `right ${color}`;

        }
        catch(err){

            console.log(err);

        }
    }

    document.getElementById(
        "lastUpdate"
    ).textContent =
    "Last Updated: " +
    new Date().toLocaleTimeString();

}

updateMarkets();

setInterval(
    updateMarkets,
    25000
);

});

</script>

</body>
</html>
