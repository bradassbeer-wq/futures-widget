<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brad's Market Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:#e6edf3;
    font-family:Segoe UI,Arial,sans-serif;
    overflow-x:hidden;
}

.market-box{
    width:100vw;
    min-height:100vh;
    background:#161b22;
}

.tabs{
    display:flex;
    gap:30px;
    padding:20px 30px;
    background:#0d1117;
    border-bottom:1px solid #30363d;
}

.tab{
    color:#8b949e;
    font-size:20px;
    font-weight:600;
}

.active{
    color:white;
    border-bottom:3px solid #58a6ff;
    padding-bottom:8px;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#21262d;
}

th{
    padding:18px;
    text-align:right;
    font-size:18px;
    color:#8b949e;
    border-bottom:1px solid #30363d;
}

th:first-child,
th:nth-child(2){
    text-align:left;
}

td{
    padding:22px 18px;
    font-size:28px;
    border-bottom:1px solid #21262d;
    transition:
        color .3s ease,
        background-color .3s ease;
}

tr:hover{
    background:#1c2128;
}

.market-name{
    font-weight:600;
}

.right{
    text-align:right;
}

.up{
    color:#3fb950;
    font-weight:bold;
}

.down{
    color:#f85149;
    font-weight:bold;
}

.flash-up{
    animation:flashUp .6s;
}

.flash-down{
    animation:flashDown .6s;
}

@keyframes flashUp{
    from{
        background:#3fb95066;
    }
    to{
        background:transparent;
    }
}

@keyframes flashDown{
    from{
        background:#f8514966;
    }
    to{
        background:transparent;
    }
}

.status-bar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#0d1117;
    border-top:1px solid #30363d;
    padding:12px 20px;
    color:#8b949e;
    font-size:14px;
}

</style>
</head>

<body>

<div class="market-box">

<div class="tabs">
    <div class="tab active">US</div>
    <div class="tab">EUROPE</div>
    <div class="tab">ASIA</div>
    <div class="tab">FX</div>
    <div class="tab">RATES</div>
    <div class="tab">FUTURES</div>
</div>

<table>

<thead>
<tr>
    <th></th>
    <th>MARKET</th>
    <th>PRICE</th>
    <th>CHANGE</th>
    <th>% CHANGE</th>
</tr>
</thead>

<tbody id="marketData">
</tbody>

</table>

</div>

<div id="lastUpdate" class="status-bar">
Connecting...
</div>

<script>

const API_KEY = "d9h3de1r01qhv00kjgf0d9h3de1r01qhv00kjgfg";

const markets = [

    { id:"dow",    name:"Dow",     symbol:"DIA" },
    { id:"spx",    name:"S&P 500", symbol:"SPY" },
    { id:"nasdaq", name:"Nasdaq",  symbol:"QQQ" },
    { id:"gold",   name:"Gold",    symbol:"GLD" },
    { id:"silver", name:"Silver",  symbol:"SLV" },
    { id:"oil",    name:"Oil",     symbol:"USO" }

];

const tbody = document.getElementById("marketData");

function createRows(){

    markets.forEach(market=>{

        const row = document.createElement("tr");

        row.innerHTML = `
            <td id="${market.id}-arrow">-</td>
            <td class="market-name">${market.name}</td>
            <td class="right" id="${market.id}-price">--</td>
            <td class="right" id="${market.id}-change">--</td>
            <td class="right" id="${market.id}-pct">--</td>
        `;

        tbody.appendChild(row);

    });

}

function flashPrice(cell,newValue){

    const previous =
        parseFloat(cell.textContent);

    if(!isNaN(previous)){

        if(newValue > previous){

            cell.classList.add("flash-up");

            setTimeout(()=>{
                cell.classList.remove("flash-up");
            },600);

        }

        if(newValue < previous){

            cell.classList.add("flash-down");

            setTimeout(()=>{
                cell.classList.remove("flash-down");
            },600);

        }
    }
}

async function updateMarkets(){

    for(const market of markets){

        try{

            const response =
                await fetch(
                    `https://finnhub.io/api/v1/quote?symbol=${market.symbol}&token=${API_KEY}`
                );

            const data =
                await response.json();

            const price =
                Number(data.c);

            const change =
                Number(data.d);

            const percent =
                Number(data.dp);

            const positive =
                change >= 0;

            const color =
                positive ? "up" : "down";

            const arrowCell =
                document.getElementById(`${market.id}-arrow`);

            const priceCell =
                document.getElementById(`${market.id}-price`);

            const changeCell =
                document.getElementById(`${market.id}-change`);

            const pctCell =
                document.getElementById(`${market.id}-pct`);

            flashPrice(priceCell,price);

            arrowCell.innerHTML =
                positive ? "▲" : "▼";

            arrowCell.className =
                color;

            priceCell.textContent =
                price.toFixed(2);

            changeCell.textContent =
                change.toFixed(2);

            changeCell.className =
                `right ${color}`;

            pctCell.textContent =
                percent.toFixed(2) + "%";

            pctCell.className =
                `right ${color}`;

        }
        catch(err){

            console.log(err);

        }
    }

    document.getElementById("lastUpdate").innerHTML =
        "Last Updated: " +
        new Date().toLocaleTimeString([],{
            hour:'2-digit',
            minute:'2-digit',
            second:'2-digit'
        });

}

createRows();

updateMarkets();

setInterval(updateMarkets,10000);

</script>

</body>
</html>
