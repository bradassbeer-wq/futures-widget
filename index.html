<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Futures Dashboard</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#0b0b0c;
    color:#ffffff;
    font-family:Arial,Helvetica,sans-serif;
}

h2{
    margin:0 0 15px 0;
    color:#ffffff;
}

.widget-wrap{
    max-width:700px;
}
</style>
</head>
<body>

<h2>Futures Market Overview</h2>

<div class="widget-wrap">
    <div class="tradingview-widget-container">
        <div id="tradingview_futures"></div>

        <script
            type="text/javascript"
            src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js"
            async>
        {
            "colorTheme":"dark",
            "dateRange":"1D",
            "showChart":true,
            "locale":"en",
            "largeChartUrl":"",
            "isTransparent":false,
            "showSymbolLogo":true,
            "showFloatingTooltip":true,
            "width":"100%",
            "height":"550",
            "tabs":[
                {
                    "title":"Futures",
                    "symbols":[
                        { "s":"CME_MINI:YM1!", "d":"Dow Futures" },
                        { "s":"CME_MINI:ES1!", "d":"S&P 500 Futures" },
                        { "s":"CME_MINI:NQ1!", "d":"Nasdaq Futures" },
                        { "s":"COMEX:GC1!", "d":"Gold" },
                        { "s":"COMEX:SI1!", "d":"Silver" },
                        { "s":"NYMEX:CL1!", "d":"Crude Oil" }
                    ]
                }
            ]
        }
        </script>
    </div>
</div>

</body>
</html>
