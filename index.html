<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brad's Futures Dashboard</title>

<style>
body {
    margin: 0;
    background: #0b0b0c;
    color: white;
    font-family: Arial, sans-serif;
}

.header {
    padding: 15px 20px;
    font-size: 28px;
    font-weight: bold;
}

.ticker-container {
    padding: 10px;
}

.info {
    padding: 20px;
    color: #aaa;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
    Futures Market Overview
</div>

<div class="ticker-container">
    <!-- TradingView Widget BEGIN -->
    <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>

        <script
            type="text/javascript"
            src="https://s3.tradingview.com/external-embedding/[
                {
                    "description": "Dow Futures",
                    "proName": "CBOT_MINI:YM1!"
                },
                {
                    "description": "S&P 500 Futures",
                    "proName": "CME_MINI:ES1!"
                },
                {
                    "description": "Nasdaq Futures",
                    "proName": "CME_MINI:NQ1!"
                },
                {
                    "description": "Gold",
                    "proName": "COMEX:GC1!"
                },
                {
                    "description": "Silver",
                    "proName": "COMEX:SI1!"
                },
                {
                    "description": "Crude Oil",
                    "proName": "NYMEX:CL1!"
                }
            ],
            "showSymbolLogo": true,
            "colorTheme": "dark",
            "isTransparent": false,
            "displayMode": "adaptive",
            "locale": "en"
        }
        </script>
    </div>
    <!-- TradingView Widget END -->
</div>

<div class="info">
    Live futures pricing and market movement.
</div>

</body>
</html>
