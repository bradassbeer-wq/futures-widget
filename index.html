<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brad's Futures Dashboard</title>

<style>
body {
    margin: 0;
    background: #0b0b0c;
    font-family: Arial, sans-serif;
    color: white;
}

h1 {
    padding: 20px;
    margin: 0;
}

.wrapper {
    padding: 10px;
}
</style>
</head>

<body>

<h1>Futures Dashboard</h1>

<div class="wrapper">

    <!-- TradingView Widget BEGIN -->
    <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>

        <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js"
        async>
        {
          "symbols": [
            {
              "description": "Dow Futures",
              "proName": "CBOT_MINI:YM1!"
            },
            {
              "description": "S&P 500 Futures",
              "proName": "CME_MINI:ES1!"
            },
            {
              "description": "Nasdaq Futures",
              "proName": "CME_MINI:NQ1!"
            },
            {
              "description": "Gold",
              "proName": "COMEX:GC1!"
            },
            {
              "description": "Silver",
              "proName": "COMEX:SI1!"
            },
            {
              "description": "Crude Oil",
              "proName": "NYMEX:CL1!"
            }
          ],
          "showSymbolLogo": true,
          "colorTheme": "dark",
          "isTransparent": false,
          "displayMode": "adaptive",
          "locale": "en"
        }
        </script>

    </div>
    <!-- TradingView Widget END -->

</div>

</body>
</html>
